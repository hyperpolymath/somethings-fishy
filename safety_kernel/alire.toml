name = "safety_kernel"
description = "SPARK-proven write-path and clone-destination guards for robofishy"
version = "0.1.0-dev"

# Estate policy (see /home/hyper/.claude/CLAUDE.md § License Policy):
# MPL-2.0 is preferred for hyperpolymath original code; MPL-2.0 is
# the SPDX-validated fallback used here because Alire's manifest validator
# does not yet accept PMPL. Source files still carry MPL-2.0 SPDX
# headers.
licenses = "MPL-2.0"

authors = ["Jonathan D.A. Jewell"]
maintainers = ["Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"]
maintainers-logins = ["hyperpolymath"]
website = "https://github.com/hyperpolymath/somethings-fishy"
tags = ["spark", "safety", "forensics"]

# No hard build deps beyond the default toolchain. gnatprove (the SPARK
# verifier) used to be a hard dep here, but Alire on CI could not always
# install it from the community index, which blocked the plain link
# build - and build.rs explicitly notes that v0's build step is about
# *linkage*, not proof discharge (verification is a separate CI job).
# When running the proof step, install gnatprove explicitly via
# `alr toolchain --select gnatprove` or a sibling CI step.
