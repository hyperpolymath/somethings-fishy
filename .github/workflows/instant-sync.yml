# SPDX-License-Identifier: MPL-2.0
# Instant Forge Sync - Triggers propagation to all forges on push/release
name: Instant Sync
on:
  push:
    branches: [main, master]
  release:
    types: [published]
permissions:
  contents: read
jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Presence gate (hypatia WF017): on repos where the secret hasn't
      # been propagated the dispatch would fail every push — skip cleanly
      # instead. The `secrets` context is NOT available in step-level
      # `if:` (a workflow-file parse error), so a probe step reads the
      # secret via env and publishes a presence boolean to GITHUB_OUTPUT.
      - name: Check dispatch token presence
        id: token
        env:
          FARM_DISPATCH_TOKEN: ${{ secrets.FARM_DISPATCH_TOKEN }}
        run: |
          if [ -n "$FARM_DISPATCH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FARM_DISPATCH_TOKEN not configured — skipping forge propagation"
          fi
      - name: Trigger Propagation
        if: steps.token.outputs.present == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v3
        with:
          token: ${{ secrets.FARM_DISPATCH_TOKEN }}
          repository: hyperpolymath/.git-private-farm
          event-type: propagate
          client-payload: |-
            {
              "repo": "${{ github.event.repository.name }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "forges": ""
            }
      - name: Confirm
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: echo "::notice::Propagation triggered for ${REPO_NAME}"
