# SPDX-License-Identifier: MPL-2.0
name: Secret Scanner
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  scan:
    # The reusable's gitleaks job requests pull-requests: write (PR
    # summary comments, .git-private-farm#69) and actions: read. A
    # called workflow cannot exceed the caller's grant — without these
    # here every run dies at startup ("workflow is requesting
    # pull-requests: write, but is only allowed pull-requests: none").
    permissions:
      contents: read
      pull-requests: write
      actions: read
    uses: hyperpolymath/standards/.github/workflows/secret-scanner-reusable.yml@d7c22711e830e1f383846472f6e9b99debdb201e
    secrets: inherit
